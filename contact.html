<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Me</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: antiquewhite;
}

.contact-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px burlywood;
}

.mood-btn {
    margin: 5px;
}

footer {
    margin-top: 50px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
    <a class="navbar-brand" href="index.html">🐶 Makoy Dog World</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="menu">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
    </div>
</div>
</nav>

<div class="container mt-5">
<div class="row g-4">
<Center>
    <div class="col-md-7">
        <div class="contact-box">
            <h2>Send Me a Message 🐾</h2>
            <p>I’d love to hear your dog stories or even just say hi.</p>

            <form>
                <div class="mb-3">
                    <label>Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="example@email.com">
                </div>

                <div class="mb-3">
                    <label>Your Message</label>
                    <textarea id="message" class="form-control" rows="4" placeholder="Tell me something about your dog..."></textarea>
                    <small id="counter">0 characters</small>
                </div>

                <div class="mb-3">
                    <label>Pick your dog's mood today:</label><br>
                    <button type="button" class="btn btn-outline-primary mood-btn">🐕 Happy</button>
                    <button type="button" class="btn btn-outline-success mood-btn">🎾 Playful</button>
                    <button type="button" class="btn btn-outline-warning mood-btn">😴 Sleepy</button>
                    <button type="button" class="btn btn-outline-danger mood-btn">😡 Grumpy</button>
                </div>

                <button class="btn btn-dark w-100">Send Message</button>
            </form>
        </div>
    </div>

</div>
</div>
</Center>
<footer class="bg-dark text-white text-center p-3">
    <p>© 2026 My Dog World | Created by Me</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
